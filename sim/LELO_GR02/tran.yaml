#<name>:
#  src:
#    - <paramters>
#  typ: <typical spec value>
#  name: <long name>
#  min: <minimum spec value>
#  max: <maximum spec value>
#  scale: <scale, multiply result by scale>
#  digits: <significant digits>
#  unit: Unit


freq_intercept:
  src:
    - freq_intercept
  name: Oscillation frequency, offset at zero celsius
  scale: 1e-6
  digits: 3
  min: 1
  max: 10
  unit: MHz

freq_slope:
  src:
    - freq_slope
  name: Oscillation frequency, increase per kelvin
  scale: 1e-6
  digits: 3
  min: 0.005
  max: 0.05
  unit: MHz

freq_rvalue:
  src:
    - freq_rvalue
  name: Oscillation frequency, Pearson correlation coefficient
  min: -5%
  typ: 1
  max: 5%
  digits: 3
  unit: ""

freq_max_sq_err_per_fs:
  src:
    - freq_max_abs_err_per_fs
  name: Maximum error from straight line, relative to full scale
  min: 0
  typ: 0
  max: 1.01
  digits: 3
  unit: ""

i_act_25:
  src:
    - i_act_25
  name: Active current at 25 celsius
  typ: 30
  min: 5
  max: 100
  scale: -1e6
  digits: 3
  unit: uA

i_leak_25:
  src:
    - i_leak_25
  name: Leakage current at 25 celsius
  typ: 1
  min: 0.1
  max: 1
  scale: -1e9
  digits: 3
  unit: nA