#<name>:
#  src:
#    - <paramters>
#  typ: <typical spec value>
#  name: <long name>
#  min: <minimum spec value>
#  max: <maximum spec value>
#  scale: <scale, multiply result by scale>
#  digits: <significant digits>
#  unit: Unit

iptat_intercept:
  src:
    - iptat_intercept
  name: Current proportial to temperature, offset at zero celsius
  scale: 1e6
  digits: 3
  min: 0.05
  max: 10
  unit: uA

iptat_slope:
  src:
    - iptat_slope
  name: Current proportial to temperature, increase per kelvin
  scale: 1e6
  digits: 3
  min: 0.001
  max: 0.010
  unit: uA/K

iptat_rvalue:
  src:
    - iptat_rvalue
  name: Current proportial to temperature, Pearson correlation coefficient
  min: -5%
  typ: 1
  max: 5%
  digits: 3
  unit: ""

vctat_intercept:
  src:
    - vctat_intercept
  name: Voltage complementary to temperature, offset at zero celsius
  scale: 1e3
  digits: 3
  min: 200
  max: 1200
  unit: mV

vctat_slope:
  src:
    - vctat_slope
  name: Voltage complementary to temperature, increase per kelvin
  scale: 1e3
  digits: 3
  min: -2
  max: -0.5
  unit: mV/K

vctat_rvalue:
  src:
    - vctat_rvalue
  name: Voltage complementary to temperature, Pearson correlation coefficient
  min: +5%
  typ: -1
  max: -5%
  digits: 3
  unit: ""

i_act_25:
  src:
    - i_act_25
  name: Active current at 25 celsius
  typ: 30
  min: 5
  max: 100
  scale: -1e6
  digits: 3
  unit: uA

i_leak_25:
  src:
    - i_leak_25
  name: Leakage current at 25 celsius
  typ: 1
  min: -0.01
  max: 1
  scale: -1e9
  digits: 3
  unit: nA
